services:
  # Frontend - Serveur web Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vite_gourmand_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - vite_gourmand_network

  # Nginx - Proxy pour le backend Symfony
  nginx:
    image: nginx:alpine
    container_name: vite_gourmand_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - vite_gourmand_network

  # Backend - Symfony avec API Platform
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vite_gourmand_backend
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/var/www/html
    environment:
      DATABASE_URL: mysql://vite_user:vite_password@mysql:3306/vite_gourmand_db?serverVersion=8.0
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: vite_gourmand_mongo
      APP_ENV: dev
      APP_SECRET: ECF-Studi-production-123456789
    depends_on:
      - mysql
      - mongo
    networks:
      - vite_gourmand_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: vite_gourmand_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: vite_gourmand_db
      MYSQL_USER: vite_user
      MYSQL_PASSWORD: vite_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - vite_gourmand_network

  # Adminer - Interface MySQL
  adminer:
    image: adminer:latest
    container_name: vite_gourmand_adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - vite_gourmand_network

  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: vite_gourmand_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: vite_gourmand_mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - vite_gourmand_network

  # Mongo Express - Interface MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: vite_gourmand_mongo_express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - vite_gourmand_network

volumes:
  mysql_data:
  mongo_data:

networks:
  vite_gourmand_network:
    driver: bridge